<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wed-mobile-device</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">LOGO</div>
            <div class="navigations">
                <a href="">home </a>
                <a href="">device</a>
            </div>
        </div>
        <div class="hero">
            <div class="phone-container">
                <div class="view-screen">
                    <div class="mobile-header">
                        <h3>Nokia</h3>
                    </div>
                    <div class="mobile-screen">

                    </div>
                </div>
                <div class="control-buttons">
                    <div class="left-control">
                        <button>nav</button>
                        <button>ans</button>
                    </div>
                    <div class="center-control">
                        <div class="center-container">
                            <button id="up-btn">up</button>
                            <div class="center-btn">
                                <button>left</button>
                                <button>center</button>
                                <button>right</button>
                            </div>
                            <button id="down-btn">down</button>
                        </div>
                    </div>
                    <div class="right-control">
                        <button>back</button>
                        <button>home</button>
                    </div>

                </div>
                <div class="numeric-buttons">
                        <div class="button-row">
                            <button>1</button>
                            <button>2</button>
                            <button>3</button>
                        </div>
                        <div class="button-row">
                            <button>4</button>
                            <button>5</button>
                            <button>6</button>
                        </div>
                        <div class="button-row">
                            <button>7</button>
                            <button>8</button>
                            <button>9</button>
                        </div>
                        <div class="button-row">
                            <button>*</button>
                            <button>0</button>
                            <button>#</button>
                        </div>
                </div>

            </div>
        </div>
    </div>
    
</body>
</html>
